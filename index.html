<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Global AnonChat - Luxury Edition</title>
    <link rel="icon" type="image/png" href="https://api.dicebear.com/7.x/bottts-neutral/svg?seed=anon&backgroundColor=b6e3f4">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, serverTimestamp, where, doc, updateDoc, arrayUnion, increment, getDoc, setDoc, Timestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCWCXK058NvKRUS5ifqWWFUw0n5nN25S-s",
            authDomain: "anonim-a20a5.firebaseapp.com",
            databaseURL: "https://anonim-a20a5-default-rtdb.firebaseio.com",
            projectId: "anonim-a20a5",
            storageBucket: "anonim-a20a5.firebasestorage.app",
            messagingSenderId: "680990138057",
            appId: "1:680990138057:web:c4cf29e026467a05eff718",
            measurementId: "G-X12LBR4XNY"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let activeTargetId = null;
        let inboxMessages = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('my-id-display').innerText = user.uid.slice(0, 6);
                listenToGlobal();
                listenToInbox();
                initPresence(); // Mulai hitung online real-time
            } else {
                try {
                    await signInAnonymously(auth);
                } catch (e) { console.error("Auth Error:", e); }
            }
        });

        // --- SISTEM ONLINE REAL-TIME ---
        async function initPresence() {
            if (!currentUser) return;
            
            const userStatusRef = doc(db, "presence", currentUser.uid);

            // Update status saat pertama masuk
            const updateStatus = async () => {
                await setDoc(userStatusRef, {
                    lastActive: serverTimestamp(),
                }, { merge: true });
            };

            await updateStatus();
            setInterval(updateStatus, 30000); // Heartbeat setiap 30 detik

            // Hitung user yang aktif dalam 2 menit terakhir
            const q = query(collection(db, "presence"));
            onSnapshot(q, (snapshot) => {
                const now = Date.now();
                const twoMinutesAgo = now - (2 * 60 * 1000);
                
                let activeCount = 0;
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    if (data.lastActive && data.lastActive.toMillis() > twoMinutesAgo) {
                        activeCount++;
                    }
                });
                
                document.getElementById('online-count').innerText = `${activeCount} Online`;
            });
        }

        window.toggleLike = async (docId) => {
            if (!docId || !currentUser) return;
            const docRef = doc(db, "global_feed", docId);
            
            try {
                const snap = await getDoc(docRef);
                if (!snap.exists()) return;
                
                const data = snap.data();
                const likedBy = data.likedBy || [];
                
                if (likedBy.includes(currentUser.uid)) {
                    showToast("Kamu sudah menyukai ini! ✨");
                    return;
                }

                await updateDoc(docRef, {
                    likedBy: arrayUnion(currentUser.uid),
                    likes: increment(1)
                });
            } catch (e) { console.error("Error liking:", e); }
        };

        window.openPrivateModal = (targetId, name) => {
            activeTargetId = targetId;
            document.getElementById('target-anon-name').innerText = name;
            document.getElementById('private-modal').classList.remove('hidden');
            document.getElementById('private-modal').classList.add('flex');
        };

        window.closePrivateModal = () => {
            document.getElementById('private-modal').classList.add('hidden');
            document.getElementById('private-modal').classList.remove('flex');
            document.getElementById('private-input').value = "";
        };

        window.sendPrivate = async () => {
            const input = document.getElementById('private-input');
            const text = input.value.trim();
            if (!text || !activeTargetId || !currentUser) return;

            const btn = document.getElementById('send-private-btn');
            btn.disabled = true;

            try {
                await addDoc(collection(db, "private_messages"), {
                    senderId: currentUser.uid,
                    receiverId: activeTargetId,
                    content: text,
                    timestamp: serverTimestamp()
                });
                showToast("Pesan Rahasia Terkirim! 🚀");
                closePrivateModal();
            } catch (e) { 
                console.error(e); 
            } finally { 
                btn.disabled = false; 
            }
        };

        window.sendGlobal = async () => {
            const input = document.getElementById('global-input');
            const text = input.value.trim();
            if (!text || !currentUser) return;

            const btn = document.getElementById('send-btn');
            btn.disabled = true;
            input.value = "";

            try {
                await addDoc(collection(db, "global_feed"), {
                    senderId: currentUser.uid,
                    content: text,
                    timestamp: serverTimestamp(),
                    color: getRandomNGLColor(),
                    likes: 0,
                    likedBy: [],
                    views: Math.floor(Math.random() * 10) + 1
                });
            } catch (e) { console.error(e); } 
            finally { btn.disabled = false; }
        };

        function listenToGlobal() {
            const q = query(collection(db, "global_feed"), limit(50)); 
            onSnapshot(q, (snapshot) => {
                const messages = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                messages.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                renderGlobal(messages);
            });
        }

        function listenToInbox() {
            if (!currentUser) return;
            const q = query(collection(db, "private_messages"), where("receiverId", "==", currentUser.uid));
            onSnapshot(q, (snapshot) => {
                inboxMessages = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                inboxMessages.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                
                const badge = document.getElementById('inbox-badge');
                badge.innerText = inboxMessages.length;
                badge.classList.toggle('hidden', inboxMessages.length === 0);
            });
        }

        function renderGlobal(messages) {
            const container = document.getElementById('global-list');
            container.innerHTML = messages.map(msg => {
                const shortId = msg.senderId ? msg.senderId.slice(0, 4) : 'xxxx';
                const avatarUrl = `https://api.dicebear.com/7.x/avataaars/svg?seed=${msg.senderId}&backgroundColor=b6e3f4`;
                const likes = msg.likes || 0;
                const hasLiked = msg.likedBy && msg.likedBy.includes(currentUser?.uid);
                const isTrending = likes >= 5;
                
                return `
                <div class="${msg.color || 'bg-gradient-to-br from-pink-500 to-rose-600'} p-6 rounded-[2.5rem] shadow-lg mb-6 transform transition-all active:scale-[0.97] relative overflow-hidden">
                    ${isTrending ? '<div class="absolute top-4 -right-8 bg-yellow-400 text-black text-[8px] font-black px-10 py-1 rotate-45 shadow-lg z-20">HOT TOPIC</div>' : ''}
                    <div class="flex items-center justify-between mb-3">
                        <div class="flex items-center space-x-3 opacity-90">
                            <div class="w-8 h-8 rounded-full bg-white/20 border border-white/30 overflow-hidden">
                                <img src="${avatarUrl}" alt="Anon" class="w-full h-full object-cover">
                            </div>
                            <div class="flex flex-col">
                                <span class="text-[10px] text-white font-black uppercase tracking-widest">@anon_${shortId}</span>
                                <span class="text-[8px] text-white/70 font-bold italic">Global Feed</span>
                            </div>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="copyMessage(\`${msg.content}\`)" class="bg-white/20 hover:bg-white/30 p-2 rounded-full transition-colors">
                                <i data-lucide="copy" class="w-4 h-4 text-white"></i>
                            </button>
                            <button onclick="openPrivateModal('${msg.senderId}', '@anon_${shortId}')" class="bg-white/20 hover:bg-white/30 p-2 rounded-full transition-colors">
                                <i data-lucide="send" class="w-4 h-4 text-white"></i>
                            </button>
                        </div>
                    </div>
                    <p class="text-white font-bold text-xl leading-tight italic mb-4">"${msg.content}"</p>
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-2 bg-black/10 px-3 py-1 rounded-full">
                             <i data-lucide="eye" class="w-3 h-3 text-white/50"></i>
                             <span class="text-[10px] text-white/50 font-bold">${(msg.views || 0) + (likes * 3)}</span>
                        </div>
                        <button onclick="toggleLike('${msg.id}')" class="flex items-center space-x-2 bg-white/20 hover:bg-white/30 px-4 py-2 rounded-full transition-all active:scale-90 group">
                            <i data-lucide="heart" class="w-4 h-4 text-white ${hasLiked ? 'fill-white' : ''}"></i>
                            <span class="text-white text-xs font-black">${likes}</span>
                        </button>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        window.renderInbox = (messages) => {
            const container = document.getElementById('inbox-list');
            if (messages.length === 0) {
                container.innerHTML = `
                <div class="flex flex-col items-center justify-center py-20 opacity-30">
                    <i data-lucide="ghost" class="w-16 h-16 mb-4 text-black"></i>
                    <p class="italic font-bold text-black">Inbox masih kosong...</p>
                </div>`;
            } else {
                container.innerHTML = messages.map(msg => `
                    <div class="bg-white/60 p-6 rounded-[2.5rem] border border-white/50 mb-4 shadow-sm transform transition-all active:scale-95 cursor-pointer hover:bg-white/80">
                        <div class="flex items-center space-x-2 mb-2">
                            <span class="text-[8px] font-black bg-pink-500 text-white px-2 py-0.5 rounded-full uppercase">Rahasia Baru</span>
                        </div>
                        <p class="text-gray-800 font-bold text-lg leading-snug">"${msg.content}"</p>
                    </div>`).join('');
            }
            lucide.createIcons();
        };

        window.switchTab = (tab) => {
            const globalView = document.getElementById('view-global');
            const inboxView = document.getElementById('view-inbox');
            const tg = document.getElementById('tab-global');
            const ti = document.getElementById('tab-inbox');

            if (tab === 'global') {
                globalView.classList.remove('hidden'); 
                inboxView.classList.add('hidden');
                tg.classList.add('nav-active'); tg.classList.remove('text-black/30');
                ti.classList.remove('nav-active'); ti.classList.add('text-black/30');
            } else {
                globalView.classList.add('hidden'); 
                inboxView.classList.remove('hidden');
                ti.classList.add('nav-active'); ti.classList.remove('text-black/30');
                tg.classList.remove('nav-active'); tg.classList.add('text-black/30');
                window.renderInbox(inboxMessages);
            }
        };

        window.copyMessage = (text) => {
            const tempInput = document.createElement("textarea");
            tempInput.value = text;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);
            showToast("Pesan Berhasil Disalin! ✨");
        };

        window.showToast = (text) => {
            const notify = document.getElementById('luxury-toast');
            notify.innerText = text;
            notify.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => notify.classList.add('translate-y-20', 'opacity-0'), 2000);
        };

        window.getRandomNGLColor = () => {
            const colors = ['bg-gradient-to-br from-pink-500 to-rose-600', 'bg-gradient-to-br from-orange-400 to-red-500', 'bg-gradient-to-br from-indigo-500 to-purple-600', 'bg-gradient-to-br from-emerald-400 to-teal-600', 'bg-gradient-to-br from-blue-500 to-cyan-500'];
            return colors[Math.floor(Math.random() * colors.length)];
        };

        window.generateAIIdea = () => {
            const ideas = ["Apa rahasia terbesarmu yang belum pernah diceritakan?", "Kalau kamu bisa menghilang, apa hal pertama yang kamu lakukan?", "Siapa orang yang paling kamu rindukan saat ini?", "Apa penyesalan terbesarmu tahun ini?"];
            document.getElementById('global-input').value = ideas[Math.floor(Math.random() * ideas.length)];
        };

        window.onload = () => {
            lucide.createIcons();
            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            document.body.appendChild(tag);
        };
    </script>

    <style>
        @keyframes mesh { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .mesh-bg { background: linear-gradient(-45deg, #FF9A9E, #FAD0C4, #A18CD1, #FBC2EB); background-size: 400% 400%; animation: mesh 12s ease infinite; }
        .ios-blur { backdrop-filter: blur(25px) saturate(200%); -webkit-backdrop-filter: blur(25px) saturate(200%); }
        ::-webkit-scrollbar { display: none; }
        
        .app-container { height: 100dvh; width: 100vw; display: flex; flex-direction: column; position: relative; overflow: hidden; background: rgba(255,255,255,0.2); }
        @media (min-width: 640px) { 
            .app-container { height: 850px; width: 400px; border-radius: 3.5rem; border: 8px solid rgba(255,255,255,0.4); margin: auto; } 
        }
        
        .content-area { flex: 1; overflow-y: auto; padding-bottom: 120px; }
        .nav-active { color: #db2777 !important; }
        .nav-active i { transform: scale(1.1); transition: all 0.2s; }
        .nav-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="mesh-bg min-h-screen flex items-center justify-center font-sans antialiased text-gray-900 overflow-hidden">

    <div class="app-container shadow-2xl">
        
        <!-- HEADER -->
        <div class="pt-14 px-8 pb-4 flex justify-between items-end shrink-0 z-10">
            <div>
                <h1 class="text-3xl font-black tracking-tighter">AnonChat</h1>
                <div class="flex items-center space-x-2">
                    <span id="online-count" class="text-[8px] font-black bg-green-500 text-white px-2 py-0.5 rounded-full uppercase tracking-tighter">... Online</span>
                    <p class="text-[10px] font-bold text-black/40 uppercase tracking-widest">ID: <span id="my-id-display">...</span></p>
                </div>
            </div>
            <button onclick="showToast('Fitur Premium Akan Segera Datang! 💎')" class="w-10 h-10 bg-white/60 rounded-full flex items-center justify-center shadow-sm active:scale-90 transition-transform">
                <i data-lucide="crown" class="w-4 h-4 text-yellow-600"></i>
            </button>
        </div>

        <!-- MAIN CONTENT AREA -->
        <div class="content-area px-6 pt-4">
            <div id="view-global" class="space-y-6">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-white/50 relative">
                    <div class="absolute top-4 right-6 flex space-x-2">
                        <button onclick="generateAIIdea()" class="bg-purple-100 text-purple-600 p-2 rounded-full hover:bg-purple-200 transition-all">
                            <i data-lucide="sparkles" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <textarea id="global-input" placeholder="Tulis rahasiamu ke publik..." class="w-full bg-transparent border-none focus:ring-0 text-xl font-bold text-gray-800 h-24 resize-none placeholder:text-gray-200"></textarea>
                    <button id="send-btn" onclick="sendGlobal()" class="w-full bg-black text-white py-4 rounded-full font-black text-sm uppercase tracking-widest active:scale-95 transition-all shadow-lg">Kirim ke Global</button>
                </div>
                
                <div id="global-list" class="space-y-4"></div>
            </div>

            <div id="view-inbox" class="hidden">
                <h2 class="text-3xl font-black tracking-tighter mb-6 mt-4 px-2">Pesan Masuk</h2>
                <div id="inbox-list" class="space-y-4 px-2"></div>
            </div>
        </div>

        <!-- BOTTOM NAV BAR -->
        <div class="absolute bottom-8 left-1/2 -translate-x-1/2 w-[85%] h-20 bg-white/90 ios-blur rounded-[2.5rem] shadow-2xl border border-white/50 flex overflow-hidden z-50">
            <div id="tab-global" onclick="switchTab('global')" class="flex-1 nav-btn nav-active">
                <i data-lucide="globe" class="w-6 h-6"></i>
                <span class="text-[9px] font-black uppercase mt-1">Global</span>
            </div>
            <div id="tab-inbox" onclick="switchTab('inbox')" class="flex-1 nav-btn text-black/30">
                <div class="relative">
                    <i data-lucide="message-circle" class="w-6 h-6"></i>
                    <div id="inbox-badge" class="hidden absolute -top-1 -right-2 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center border-2 border-white font-bold">0</div>
                </div>
                <span class="text-[9px] font-black uppercase mt-1">Inbox</span>
            </div>
        </div>

        <!-- TOAST -->
        <div id="luxury-toast" class="fixed bottom-32 left-1/2 -translate-x-1/2 bg-black text-white px-6 py-3 rounded-full text-[10px] font-black uppercase tracking-widest shadow-2xl transition-all duration-300 opacity-0 translate-y-20 z-[200]">
            Terkirim! ✨
        </div>

    </div>

    <!-- MODAL -->
    <div id="private-modal" class="hidden fixed inset-0 z-[100] items-center justify-center p-6 bg-black/40 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl animate-in zoom-in-95 duration-300">
            <div class="flex justify-between items-start mb-6">
                <h3 class="text-xl font-black tracking-tight leading-tight">Kirim Pesan ke <br><span id="target-anon-name" class="text-pink-600">@anon</span></h3>
                <button onclick="closePrivateModal()" class="text-gray-300 hover:text-gray-600"><i data-lucide="x"></i></button>
            </div>
            <textarea id="private-input" placeholder="Tulis pesan rahasia..." class="w-full bg-gray-50 rounded-[2rem] p-6 border-none focus:ring-2 ring-pink-500 text-lg font-bold min-h-[150px] mb-6"></textarea>
            <button id="send-private-btn" onclick="sendPrivate()" class="w-full bg-gradient-to-r from-pink-500 to-rose-600 text-white py-5 rounded-full font-black uppercase tracking-widest shadow-lg active:scale-95 transition-all">Kirim Pesan</button>
        </div>
    </div>

    <div id="yt-player" class="hidden"></div>

    <script>
        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '0', width: '0', videoId: 'wbz5pGyWOP4',
                events: { 'onReady': (event) => {
                    document.body.addEventListener('click', () => { event.target.playVideo(); }, { once: true });
                } }
            });
        }
    </script>
</body>
</html>
