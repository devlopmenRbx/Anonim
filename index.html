<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Vault - Luxury Private Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide-react/0.263.0/umd/lucide-react.min.js"></script>
    <!-- Firebase SDK (Compat Version for ease of use) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap');

        :root {
            --silk: #fdfaf7;
            --gold: #d4af37;
            --rose: #e4b1ab;
            --glass: rgba(255, 255, 255, 0.7);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #fdfaf7 0%, #f5e6d3 100%);
            height: 100dvh;
            overflow: hidden;
            color: #2d2d2d;
            -webkit-tap-highlight-color: transparent;
        }

        .luxury-font { font-family: 'Playfair Display', serif; }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .ios-keypad-btn {
            @apply w-16 h-16 rounded-full flex items-center justify-center text-2xl transition-all active:scale-90 glass shadow-sm;
        }

        .tab-item { @apply transition-all duration-300 opacity-30; }
        .tab-item.active { @apply opacity-100; color: var(--gold); transform: translateY(-4px); }
        
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        #youtube-player-container {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .photo-card {
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .photo-card:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div id="youtube-player-container">
        <div id="player"></div>
    </div>

    <div id="lock-screen" class="fixed inset-0 z-[100] flex flex-col items-center justify-between py-16 px-8 glass transition-all duration-1000 ease-in-out">
        <div class="text-center">
            <h1 id="current-time" class="text-7xl font-light tracking-tight opacity-90">00:00</h1>
            <p id="current-date" class="text-xs tracking-[0.3em] uppercase mt-4 opacity-60">Memuat Tanggal...</p>
        </div>

        <div class="w-full max-w-[280px] flex flex-col items-center">
            <div id="pin-dots" class="flex gap-5 mb-12">
                <div class="w-3 h-3 rounded-full border-2 border-gray-300 transition-all duration-300"></div>
                <div class="w-3 h-3 rounded-full border-2 border-gray-300 transition-all duration-300"></div>
                <div class="w-3 h-3 rounded-full border-2 border-gray-300 transition-all duration-300"></div>
                <div class="w-3 h-3 rounded-full border-2 border-gray-300 transition-all duration-300"></div>
            </div>

            <div class="grid grid-cols-3 gap-6 w-full">
                <button onclick="handlePin('1')" class="ios-keypad-btn">1</button>
                <button onclick="handlePin('2')" class="ios-keypad-btn">2</button>
                <button onclick="handlePin('3')" class="ios-keypad-btn">3</button>
                <button onclick="handlePin('4')" class="ios-keypad-btn">4</button>
                <button onclick="handlePin('5')" class="ios-keypad-btn">5</button>
                <button onclick="handlePin('6')" class="ios-keypad-btn">6</button>
                <button onclick="handlePin('7')" class="ios-keypad-btn">7</button>
                <button onclick="handlePin('8')" class="ios-keypad-btn">8</button>
                <button onclick="handlePin('9')" class="ios-keypad-btn">9</button>
                <div class="w-16"></div>
                <button onclick="handlePin('0')" class="ios-keypad-btn">0</button>
                <button onclick="clearPin()" class="w-16 h-16 flex items-center justify-center opacity-40 text-[10px] uppercase tracking-widest font-bold">Batal</button>
            </div>
        </div>

        <div class="flex flex-col items-center gap-3">
            <div class="p-3 rounded-full glass">
                <i data-lucide="lock" class="w-4 h-4 opacity-40"></i>
            </div>
            <p class="text-[9px] tracking-[0.4em] uppercase opacity-40">Vault Pro Encryption</p>
        </div>
    </div>

    <div id="app" class="hidden h-full flex flex-col pt-14">
        <!-- Header -->
        <div class="px-8 flex justify-between items-end mb-8">
            <div class="space-y-1">
                <h2 id="view-title" class="luxury-font text-4xl font-bold tracking-tight">Gallery</h2>
                <p class="text-[9px] uppercase tracking-[0.3em] text-gold-600 opacity-60 font-semibold">The Private Collection</p>
            </div>
            <div class="flex gap-3">
                <button onclick="toggleMusic()" id="music-btn" class="w-11 h-11 rounded-full glass flex items-center justify-center text-rose-400 shadow-sm transition-all active:scale-90">
                    <i data-lucide="music" class="w-5 h-5"></i>
                </button>
                <button onclick="document.getElementById('file-input').click()" class="w-11 h-11 rounded-full bg-black text-white flex items-center justify-center shadow-2xl transition-all active:scale-90">
                    <i data-lucide="plus" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <div id="content-area" class="flex-1 overflow-y-auto px-6 pb-32">
            <div id="gallery-grid" class="grid grid-cols-2 gap-5">
                <!-- Gallery items dynamically rendered -->
            </div>
        </div>

        <!-- Navigation Bar -->
        <div class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[85%] max-w-[400px] h-18 glass rounded-[2.5rem] flex items-center justify-around px-8 shadow-[0_20px_50px_rgba(0,0,0,0.1)] z-50">
            <button onclick="switchTab('gallery')" id="tab-gallery" class="tab-item active"><i data-lucide="layout-grid" class="w-6 h-6"></i></button>
            <button onclick="switchTab('love')" id="tab-love" class="tab-item"><i data-lucide="heart" class="w-6 h-6"></i></button>
            <button onclick="switchTab('profile')" id="tab-profile" class="tab-item"><i data-lucide="user" class="w-6 h-6"></i></button>
        </div>
    </div>

    <div id="lightbox" class="hidden fixed inset-0 z-[200] bg-black/98 flex flex-col items-center justify-center p-4 transition-all duration-300">
        <div class="absolute top-10 right-10 flex gap-8">
            <button onclick="deleteCurrentPhoto()" id="delete-btn" class="text-white/40 hover:text-red-400 transition-colors"><i data-lucide="trash-2" class="w-6 h-6"></i></button>
            <button onclick="closeLightbox()" class="text-white/80 hover:text-white transition-colors"><i data-lucide="x" class="w-7 h-7"></i></button>
        </div>
        <img id="lightbox-img" class="max-w-full max-h-[75vh] rounded-2xl object-contain shadow-[0_0_100px_rgba(255,255,255,0.1)] transition-transform duration-500" src="" alt="">
    </div>

    <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleUpload(event)">

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyBFDBKLmV-51mh7ztLmLMhFHB547EaZcZQ",
            authDomain: "newapp-27599.firebaseapp.com",
            projectId: "newapp-27599",
            storageBucket: "newapp-27599.firebasestorage.app",
            messagingSenderId: "56126723371",
            appId: "1:56126723371:web:5e73e34a819329364fe16e"
        };
        
        // --- MUSIC SETTINGS ---
        // GANTI ID DI BAWAH INI DENGAN ID YOUTUBE FAVORIT ANDA
        const YOUTUBE_VIDEO_ID = "wbz5pGyWOP4&si"; 

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        lucide.createIcons();

        let currentPin = "";
        let currentTab = 'gallery';
        let photos = [];
        let selectedPhotoId = null;
        let isMusicPlaying = false;
        let player;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '1',
                width: '1',
                videoId: YOUTUBE_VIDEO_ID,
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'loop': 1,
                    'playlist': YOUTUBE_VIDEO_ID,
                    'modestbranding': 1
                },
                events: {
                    'onReady': () => console.log("Music Ready")
                }
            });
        }

        function toggleMusic() {
            if (!player) return;
            const btn = document.getElementById('music-btn');
            if (isMusicPlaying) {
                player.pauseVideo();
                btn.classList.remove('bg-rose-50', 'animate-pulse', 'shadow-inner');
            } else {
                player.playVideo();
                btn.classList.add('bg-rose-50', 'animate-pulse', 'shadow-inner');
            }
            isMusicPlaying = !isMusicPlaying;
        }

        // Load YouTube Script
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.body.appendChild(tag);

        function handlePin(num) {
            if (currentPin.length < 4) {
                currentPin += num;
                updateDots();
                
                // PIN DEFAULT: 1212
                if (currentPin === "1212") {
                    setTimeout(unlockApp, 400);
                } else if (currentPin.length === 4) {
                    setTimeout(() => {
                        currentPin = "";
                        updateDots();
                        // Error feedback
                        const dots = document.getElementById('pin-dots');
                        dots.classList.add('animate-ping');
                        setTimeout(() => dots.classList.remove('animate-ping'), 400);
                    }, 300);
                }
            }
        }

        function updateDots() {
            const dots = document.getElementById('pin-dots').children;
            for (let i = 0; i < 4; i++) {
                if (i < currentPin.length) {
                    dots[i].classList.add('bg-black', 'border-black', 'scale-125');
                    dots[i].classList.remove('border-gray-300');
                } else {
                    dots[i].classList.remove('bg-black', 'border-black', 'scale-125');
                    dots[i].classList.add('border-gray-300');
                }
            }
        }

        function clearPin() {
            currentPin = "";
            updateDots();
        }

        function unlockApp() {
            const ls = document.getElementById('lock-screen');
            const app = document.getElementById('app');
            ls.style.opacity = '0';
            ls.style.transform = 'translateY(-100%)';
            setTimeout(() => {
                ls.classList.add('hidden');
                app.classList.remove('hidden');
                app.classList.add('fade-in');
                loadPhotos();
            }, 800);
        }

        async function handleUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1000; // Better quality
                    const scale = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const base64 = canvas.toDataURL('image/jpeg', 0.7);

                    try {
                        await db.collection('vault_photos').add({
                            image: base64,
                            liked: false,
                            timestamp: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    } catch (err) {
                        console.error("Upload error:", err);
                    }
                };
            };
        }

        function loadPhotos() {
            db.collection('vault_photos').orderBy('timestamp', 'desc').onSnapshot(snapshot => {
                photos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderGallery();
            });
        }

        function renderGallery() {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = '';
            
            let filteredPhotos = photos;
            if (currentTab === 'love') filteredPhotos = photos.filter(p => p.liked);
            if (currentTab === 'profile') {
                renderProfile();
                return;
            }

            if (filteredPhotos.length === 0) {
                grid.innerHTML = `<div class="col-span-2 py-20 text-center opacity-20"><i data-lucide="image" class="w-12 h-12 mx-auto mb-2"></i><p>Belum ada kenangan</p></div>`;
                lucide.createIcons();
                return;
            }

            filteredPhotos.forEach(p => {
                const div = document.createElement('div');
                div.className = "photo-card relative aspect-[4/5] rounded-[1.5rem] overflow-hidden fade-in group";
                div.innerHTML = `
                    <img src="${p.image}" class="w-full h-full object-cover" onclick="openLightbox('${p.id}', '${p.image}')" loading="lazy">
                    <button onclick="toggleLike('${p.id}', ${p.liked})" class="absolute top-4 right-4 w-9 h-9 rounded-full glass flex items-center justify-center shadow-lg transition-transform active:scale-125">
                        <i data-lucide="heart" class="w-4 h-4 ${p.liked ? 'fill-rose-500 text-rose-500' : 'text-white'}"></i>
                    </button>
                `;
                grid.appendChild(div);
            });
            lucide.createIcons();
        }

        async function toggleLike(id, currentState) {
            await db.collection('vault_photos').doc(id).update({ liked: !currentState });
        }

        async function deleteCurrentPhoto() {
            if (!selectedPhotoId) return;
            const confirmDelete = confirm("Hapus kenangan ini secara permanen?");
            if (confirmDelete) {
                await db.collection('vault_photos').doc(selectedPhotoId).delete();
                closeLightbox();
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            
            const titles = {
                'gallery': 'Gallery',
                'love': 'Favorites',
                'profile': 'Couple'
            };
            document.getElementById('view-title').innerText = titles[tab];
            renderGallery();
        }

        function renderProfile() {
            const area = document.getElementById('gallery-grid');
            area.innerHTML = `
                <div class="col-span-2 space-y-6 pt-4 fade-in">
                    <div class="glass p-10 rounded-[2.5rem] text-center space-y-6">
                        <div class="relative w-28 h-28 mx-auto">
                            <div class="absolute inset-0 bg-rose-200 rounded-full animate-ping opacity-20"></div>
                            <div class="relative w-full h-full bg-rose-100 rounded-full flex items-center justify-center shadow-inner">
                                <i data-lucide="heart" class="w-12 h-12 text-rose-400"></i>
                            </div>
                        </div>
                        <div>
                            <h3 class="luxury-font text-3xl font-bold">Us Together</h3>
                            <p class="text-xs opacity-40 tracking-widest uppercase mt-2">Private Access Only</p>
                        </div>
                        <div class="flex justify-around pt-6 border-t border-black/5">
                            <div><p class="text-2xl font-bold">${photos.length}</p><p class="text-[9px] uppercase tracking-widest opacity-40">Kenangan</p></div>
                            <div class="w-[1px] h-10 bg-black/5"></div>
                            <div><p class="text-2xl font-bold">${photos.filter(p => p.liked).length}</p><p class="text-[9px] uppercase tracking-widest opacity-40">Favorit</p></div>
                        </div>
                    </div>
                    <button onclick="location.reload()" class="w-full py-5 glass rounded-2xl text-[10px] uppercase tracking-[0.3em] font-bold text-red-400 active:scale-95 transition-all">Lock Security Vault</button>
                </div>
            `;
            lucide.createIcons();
        }

        function openLightbox(id, url) {
            selectedPhotoId = id;
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = url;
            lb.classList.remove('hidden');
            setTimeout(() => lb.classList.add('opacity-100'), 10);
        }

        function closeLightbox() {
            const lb = document.getElementById('lightbox');
            lb.classList.add('hidden');
            selectedPhotoId = null;
        }

        setInterval(() => {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' });
            
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('current-date').innerText = now.toLocaleDateString('id-ID', options);
        }, 1000);
    </script>
</body>
</html>
