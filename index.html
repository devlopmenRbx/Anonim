<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Global AnonChat - Grand Luxury Edition</title>
    <meta name="description" content="Kirim pesan rahasia secara anonim dan temukan rahasia lainnya secara global!">
    <meta property="og:title" content="Global AnonChat - Grand Luxury Edition">
    <meta property="og:description" content="Kirim pesan rahasia secara anonim di Global Feed!">
    <meta property="og:image" content="https://api.dicebear.com/7.x/avataaars/png?seed=luxury&backgroundColor=b6e3f4">
    <meta property="og:type" content="website">

    <link rel="icon" type="image/png" href="https://api.dicebear.com/7.x/avataaars/png?seed=luxury&backgroundColor=b6e3f4">
    <link rel="apple-touch-icon" href="https://api.dicebear.com/7.x/avataaars/png?seed=luxury&backgroundColor=b6e3f4">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, serverTimestamp, where, doc, updateDoc, arrayUnion, increment, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCWCXK058NvKRUS5ifqWWFUw0n5nN25S-s",
            authDomain: "anonim-a20a5.firebaseapp.com",
            projectId: "anonim-a20a5",
            storageBucket: "anonim-a20a5.firebasestorage.app",
            messagingSenderId: "680990138057",
            appId: "1:680990138057:web:c4cf29e026467a05eff718"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let activeTargetId = null;
        let inboxMessages = [];
        let lastInboxCount = 0;
        let lastTap = 0;
        window.isVIP = localStorage.getItem('anon_vip') === 'true';

        // Audio Effects
        const sounds = {
            pop: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
            whoosh: new Audio('https://assets.mixkit.co/active_storage/sfx/2578/2578-preview.mp3'),
            ding: new Audio('https://assets.mixkit.co/active_storage/sfx/2350/2350-preview.mp3')
        };

        function playSound(name) {
            sounds[name].currentTime = 0;
            sounds[name].play().catch(() => {});
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('my-id-display').innerText = user.uid.slice(0, 6);
                if(window.isVIP) document.getElementById('vip-status-badge').classList.remove('hidden');
                listenToGlobal();
                listenToInbox();
                initPresence(); 
                trackVisit();
            } else {
                try { await signInAnonymously(auth); } catch (e) { console.error(e); }
            }
        });

        async function trackVisit() {
            const statsRef = doc(db, "app_stats", "global_visits");
            try { await updateDoc(statsRef, { totalViews: increment(1) }); } 
            catch (e) { await setDoc(statsRef, { totalViews: 1 }); }

            onSnapshot(statsRef, (doc) => {
                if (doc.exists()) {
                    window.globalTotalViews = doc.data().totalViews || 0;
                    updateActivityTicker("Seseorang baru saja berkunjung ✨");
                }
            });
        }

        function updateActivityTicker(text) {
            const ticker = document.getElementById('activity-ticker');
            if(!ticker) return;
            ticker.innerText = text;
            ticker.classList.remove('opacity-0');
            setTimeout(() => ticker.classList.add('opacity-0'), 3000);
        }

        async function initPresence() {
            if (!currentUser) return;
            const userStatusRef = doc(db, "presence", currentUser.uid);
            const updateStatus = async () => {
                await setDoc(userStatusRef, { lastActive: serverTimestamp() }, { merge: true });
            };
            await updateStatus();
            setInterval(updateStatus, 30000);

            const q = query(collection(db, "presence"));
            onSnapshot(q, (snapshot) => {
                const now = Date.now();
                const sixtySecondsAgo = now - (60 * 1000);
                let activeCount = 0;
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    if (data.lastActive && data.lastActive.toMillis() > sixtySecondsAgo) activeCount++;
                });
                document.getElementById('online-count').innerText = `${activeCount} Online`;
            });
        }

        window.handleDoubleTap = (e, docId, btnElement) => {
            const now = Date.now();
            const TIMESPAN = 300;
            if (now - lastTap < TIMESPAN) {
                toggleLike(docId, btnElement, true);
            }
            lastTap = now;
        };

        window.toggleLike = async (docId, btnElement, isDoubleTap = false) => {
            if (!docId || !currentUser) return;
            const docRef = doc(db, "global_feed", docId);
            try {
                const snap = await getDoc(docRef);
                if (!snap.exists()) return;
                const data = snap.data();
                const likedBy = data.likedBy || [];
                
                if (likedBy.includes(currentUser.uid)) {
                    if (!isDoubleTap) showToast("Sudah kamu sukai! ✨");
                    return;
                }
                
                playSound('pop');
                createFloatingHeart(btnElement, isDoubleTap);

                const newLikes = (data.likes || 0) + 1;
                if (newLikes === 10) {
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                    showToast("WAW! Pesan ini jadi LEGENDARY! 🏆");
                }

                await updateDoc(docRef, {
                    likedBy: arrayUnion(currentUser.uid),
                    likes: increment(1)
                });
                updateActivityTicker("Seseorang me-like rahasia 🔥");
            } catch (e) { console.error(e); }
        };

        function createFloatingHeart(target, isBig = false) {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = `fixed pointer-events-none z-[3000] animate-float-up ${isBig ? 'text-6xl' : 'text-xl'}`;
            const rect = target.getBoundingClientRect();
            heart.style.left = `${rect.left + rect.width / 2}px`;
            heart.style.top = `${rect.top}px`;
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        }

        window.openPrivateModal = (targetId, name, context = null) => {
            activeTargetId = targetId;
            document.getElementById('target-anon-name').innerText = name;
            document.getElementById('private-modal').classList.remove('hidden');
            document.getElementById('private-modal').classList.add('flex');
            window.currentReplyContext = context;
        };

        window.closePrivateModal = () => {
            document.getElementById('private-modal').classList.add('hidden');
            document.getElementById('private-modal').classList.remove('flex');
            document.getElementById('private-input').value = "";
            window.currentReplyContext = null;
        };

        window.sendPrivate = async () => {
            const input = document.getElementById('private-input');
            const text = input.value.trim();
            if (!text || !activeTargetId || !currentUser) return;
            const btn = document.getElementById('send-private-btn');
            btn.disabled = true;
            try {
                await addDoc(collection(db, "private_messages"), {
                    senderId: currentUser.uid,
                    receiverId: activeTargetId,
                    content: text,
                    replyContext: window.currentReplyContext,
                    isVIP: window.isVIP,
                    timestamp: serverTimestamp()
                });
                playSound('whoosh');
                showToast("Pesan Rahasia Terkirim! 🕊️");
                closePrivateModal();
            } catch (e) { console.error(e); } finally { btn.disabled = false; }
        };

        window.sendGlobal = async () => {
            const input = document.getElementById('global-input');
            const text = input.value.trim();
            if (!text || !currentUser) return;
            const btn = document.getElementById('send-btn');
            btn.disabled = true;
            try {
                await addDoc(collection(db, "global_feed"), {
                    senderId: currentUser.uid,
                    content: text,
                    timestamp: serverTimestamp(),
                    color: window.isVIP ? 'bg-gradient-to-br from-yellow-400 via-amber-500 to-yellow-600' : getRandomNGLColor(),
                    likes: 0,
                    likedBy: [],
                    isVIP: window.isVIP
                });
                playSound('whoosh');
                input.value = "";
                showToast("Berhasil di Posting! 🚀");
            } catch (e) { console.error(e); } finally { btn.disabled = false; }
        };

        window.toggleVIP = () => {
            if(window.isVIP) {
                showToast("Kamu sudah anggota ELITE! 👑");
                return;
            }
            const codeInput = prompt("Masukkan Kode Akses VIP:");
            if(!codeInput) return;
            
            const cleanCode = codeInput.trim().toUpperCase();
            if(cleanCode === "VIP2024") {
                window.isVIP = true;
                localStorage.setItem('anon_vip', 'true');
                confetti({ particleCount: 200, spread: 100 });
                showToast("WELCOME ELITE MEMBER! 👑");
                document.getElementById('vip-status-badge').classList.remove('hidden');
            } else {
                showToast("Kode Salah! Hubungi Admin. ❌");
            }
        };

        function listenToGlobal() {
            const q = query(collection(db, "global_feed"), limit(50)); 
            onSnapshot(q, (snapshot) => {
                const messages = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                messages.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                renderGlobal(messages);
            });
        }

        function listenToInbox() {
            if (!currentUser) return;
            const q = query(collection(db, "private_messages"), where("receiverId", "==", currentUser.uid));
            onSnapshot(q, (snapshot) => {
                inboxMessages = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                inboxMessages.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                
                const badge = document.getElementById('inbox-badge');
                badge.innerText = inboxMessages.length;
                badge.classList.toggle('hidden', inboxMessages.length === 0);

                if (inboxMessages.length > lastInboxCount && lastInboxCount !== 0) {
                    playSound('ding');
                    document.getElementById('inbox-dot').classList.remove('hidden');
                    showToast("Ada pesan baru masuk! 📩");
                }
                lastInboxCount = inboxMessages.length;

                if (!document.getElementById('view-inbox').classList.contains('hidden')) {
                    renderInbox(inboxMessages);
                }
            });
        }

        function getTimeAgo(timestamp) {
            if (!timestamp) return 'baru saja';
            const seconds = Math.floor((new Date() - timestamp.toDate()) / 1000);
            if (seconds < 60) return 'baru saja';
            const mins = Math.floor(seconds / 60);
            if (mins < 60) return `${mins}m lalu`;
            const hours = Math.floor(mins / 60);
            if (hours < 24) return `${hours}j lalu`;
            return '1h+ lalu';
        }

        function renderGlobal(messages) {
            const container = document.getElementById('global-list');
            const totalViews = window.globalTotalViews || 0;
            container.innerHTML = messages.map(msg => {
                const shortId = msg.senderId ? msg.senderId.slice(0, 4) : 'xxxx';
                const avatarUrl = `https://api.dicebear.com/7.x/avataaars/svg?seed=${msg.senderId}&backgroundColor=b6e3f4`;
                const likes = msg.likes || 0;
                const hasLiked = msg.likedBy && msg.likedBy.includes(currentUser?.uid);
                const isTrending = likes >= 5;
                const isVIP = msg.isVIP === true;
                
                return `
                <div onclick="handleDoubleTap(event, '${msg.id}', this)" class="${msg.color || 'bg-gradient-to-br from-pink-500 to-rose-600'} p-6 rounded-[2.5rem] shadow-lg mb-6 transform transition-all active:scale-[0.98] relative overflow-hidden select-none ${isVIP ? 'border-4 border-yellow-300 ring-4 ring-yellow-500/20' : ''}">
                    ${isVIP ? '<div class="absolute top-2 right-2 bg-white/20 backdrop-blur-md px-3 py-1 rounded-full text-[8px] font-black text-white border border-white/30 uppercase tracking-tighter">👑 Elite Member</div>' : ''}
                    ${isTrending ? '<div class="absolute top-10 -right-8 bg-red-600 text-white text-[8px] font-black px-10 py-1 rotate-45 shadow-lg z-20 border-b-2 border-white/30">HOT TOPIC</div>' : ''}
                    <div class="flex items-center justify-between mb-3">
                        <div class="flex items-center space-x-3 opacity-90">
                            <div class="w-8 h-8 rounded-full bg-white/20 border border-white/30 overflow-hidden">
                                <img src="${avatarUrl}" alt="Anon" class="w-full h-full object-cover">
                            </div>
                            <div class="flex flex-col">
                                <span class="text-[10px] text-white font-black uppercase tracking-widest flex items-center">
                                    @anon_${shortId}
                                    ${isVIP ? '<i data-lucide="shield-check" class="w-3 h-3 ml-1 text-yellow-300"></i>' : ''}
                                </span>
                                <span class="text-[8px] text-white/70 font-bold italic">${getTimeAgo(msg.timestamp)} • Global</span>
                            </div>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="copyMessage(\`${msg.content}\`)" class="bg-white/20 hover:bg-white/30 p-2 rounded-full transition-colors">
                                <i data-lucide="copy" class="w-4 h-4 text-white"></i>
                            </button>
                            <button onclick="openPrivateModal('${msg.senderId}', '@anon_${shortId}')" class="bg-white/20 hover:bg-white/30 p-2 rounded-full transition-colors">
                                <i data-lucide="send" class="w-4 h-4 text-white"></i>
                            </button>
                        </div>
                    </div>
                    <p class="text-white font-bold text-xl leading-tight italic mb-4 ${isVIP ? 'drop-shadow-lg' : ''}">"${msg.content}"</p>
                    <div class="flex items-center justify-between">
                        <div class="bg-black/10 px-3 py-1 rounded-full">
                            <span class="text-[10px] text-white/50 font-bold"><i data-lucide="eye" class="w-3 h-3 inline mr-1"></i>${totalViews} Views</span>
                        </div>
                        <button onclick="toggleLike('${msg.id}', this)" class="flex items-center space-x-2 bg-white/20 hover:bg-white/30 px-4 py-2 rounded-full transition-all active:scale-90">
                            <i data-lucide="heart" class="w-4 h-4 text-white ${hasLiked ? 'fill-white' : ''}"></i>
                            <span class="text-white text-xs font-black">${likes}</span>
                        </button>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        window.renderInbox = (messages) => {
            const container = document.getElementById('inbox-list');
            if (messages.length === 0) {
                container.innerHTML = `<div class="flex flex-col items-center justify-center py-20 opacity-30"><i data-lucide="ghost" class="w-16 h-16 mb-4"></i><p class="italic font-bold">Belum ada pesan...</p></div>`;
            } else {
                container.innerHTML = messages.map(msg => {
                    const avatarUrl = `https://api.dicebear.com/7.x/avataaars/svg?seed=${msg.senderId}&backgroundColor=b6e3f4`;
                    const isVIP = msg.isVIP === true;
                    return `
                    <div class="bg-white/80 backdrop-blur-md p-6 rounded-[2.5rem] border border-white/50 mb-4 shadow-sm relative ${isVIP ? 'border-l-8 border-l-yellow-400' : ''}">
                        ${isVIP ? '<div class="absolute top-2 right-4 text-[7px] font-black text-yellow-600 bg-yellow-100 px-2 py-0.5 rounded-full uppercase">👑 VIP Message</div>' : ''}
                        ${msg.replyContext ? `<div class="mb-3 p-3 bg-gray-100 rounded-2xl text-[10px] italic border-l-4 border-pink-500 opacity-70">Membalas: "${msg.replyContext}"</div>` : ''}
                        <div class="flex items-center justify-between mb-3">
                            <div class="flex items-center space-x-2">
                                <img src="${avatarUrl}" class="w-6 h-6 rounded-full border border-gray-200">
                                <span class="text-[8px] font-black bg-gray-200 text-gray-600 px-2 py-0.5 rounded-full uppercase">@anon_${msg.senderId.slice(0,4)}</span>
                            </div>
                            <button onclick="openPrivateModal('${msg.senderId}', '@anon_${msg.senderId.slice(0,4)}', '${msg.content}')" class="flex items-center space-x-1 bg-pink-500 text-white px-4 py-2 rounded-full shadow-md active:scale-95">
                                <i data-lucide="reply" class="w-3 h-3"></i>
                                <span class="text-[10px] font-bold">Balas</span>
                            </button>
                        </div>
                        <p class="text-gray-800 font-bold text-lg">"${msg.content}"</p>
                    </div>`;
                }).join('');
            }
            lucide.createIcons();
        };

        window.switchTab = (tab) => {
            const globalView = document.getElementById('view-global');
            const inboxView = document.getElementById('view-inbox');
            const tg = document.getElementById('tab-global');
            const ti = document.getElementById('tab-inbox');

            if (tab === 'global') {
                globalView.classList.remove('hidden'); inboxView.classList.add('hidden');
                tg.classList.add('nav-active'); tg.classList.remove('text-black/30');
                ti.classList.remove('nav-active'); ti.classList.add('text-black/30');
            } else {
                globalView.classList.add('hidden'); inboxView.classList.remove('hidden');
                document.getElementById('inbox-dot').classList.add('hidden');
                ti.classList.add('nav-active'); ti.classList.remove('text-black/30');
                tg.classList.remove('nav-active'); tg.classList.add('text-black/30');
                renderInbox(inboxMessages);
            }
        };

        window.copyMessage = (text) => {
            navigator.clipboard.writeText(text).then(() => showToast("Teks Disalin! ✨"));
        };

        window.showToast = (text) => {
            const notify = document.getElementById('luxury-toast');
            notify.innerText = text;
            notify.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => notify.classList.add('translate-y-20', 'opacity-0'), 2500);
        };

        window.getRandomNGLColor = () => {
            const colors = ['bg-gradient-to-br from-pink-500 to-rose-600', 'bg-gradient-to-br from-orange-400 to-red-500', 'bg-gradient-to-br from-indigo-500 to-purple-600', 'bg-gradient-to-br from-emerald-400 to-teal-600', 'bg-gradient-to-br from-blue-500 to-cyan-500'];
            return colors[Math.floor(Math.random() * colors.length)];
        };

        window.generateAIIdea = () => {
            const ideas = ["Rahasia terbesarmu apa?", "Hal tergila yang pernah kamu lakukan?", "Lagi kangen siapa hari ini?", "Penyesalan terdalammu?", "Apa ketakutan terbesarmu?"];
            document.getElementById('global-input').value = ideas[Math.floor(Math.random() * ideas.length)];
        };

        window.onload = () => {
            lucide.createIcons();
            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            document.body.appendChild(tag);
        };
    </script>

    <style>
        @keyframes mesh { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        @keyframes floatUp { 0% { transform: translate(-50%, 0) scale(1); opacity: 1; } 100% { transform: translate(-50%, -150px) scale(2); opacity: 0; } }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .animate-float-up { animation: floatUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; left: 50%; position: absolute; }
        .mesh-bg { background: linear-gradient(-45deg, #FF9A9E, #FAD0C4, #A18CD1, #FBC2EB); background-size: 400% 400%; animation: mesh 15s ease infinite; }
        .ios-blur { backdrop-filter: blur(25px) saturate(200%); -webkit-backdrop-filter: blur(25px) saturate(200%); }
        ::-webkit-scrollbar { display: none; }
        .app-container { height: 100dvh; width: 100vw; display: flex; flex-direction: column; position: relative; overflow: hidden; background: rgba(255,255,255,0.1); }
        @media (min-width: 640px) { .app-container { height: 850px; width: 400px; border-radius: 3.5rem; border: 8px solid rgba(255,255,255,0.4); margin: auto; } }
        .content-area { flex: 1; overflow-y: auto; padding-bottom: 140px; }
        .nav-active { color: #db2777 !important; transform: scale(1.1); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .nav-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="mesh-bg min-h-screen flex items-center justify-center font-sans antialiased text-gray-900 overflow-hidden">

    <div class="app-container shadow-2xl">
        <!-- Header -->
        <div class="pt-14 px-8 pb-2 flex justify-between items-end shrink-0 z-10">
            <div>
                <h1 class="text-3xl font-black tracking-tighter">AnonChat</h1>
                <div class="flex items-center space-x-2">
                    <span id="online-count" class="text-[8px] font-black bg-green-500 text-white px-2 py-0.5 rounded-full uppercase animate-pulse">... Online</span>
                    <span id="vip-status-badge" class="hidden text-[8px] font-black bg-yellow-500 text-white px-2 py-0.5 rounded-full uppercase">ELITE 👑</span>
                    <p class="text-[10px] font-bold text-black/40 uppercase">ID: <span id="my-id-display">...</span></p>
                </div>
            </div>
            <button onclick="toggleVIP()" class="w-10 h-10 bg-white/60 rounded-full flex items-center justify-center shadow-sm active:scale-90 transition-transform relative group">
                <i data-lucide="crown" class="w-4 h-4 text-yellow-600"></i>
                <span class="absolute -top-1 -right-1 flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-yellow-500"></span>
                </span>
            </button>
        </div>

        <!-- Activity Ticker -->
        <div id="activity-ticker" class="px-8 text-[9px] font-black uppercase text-black/40 tracking-widest transition-opacity duration-500 opacity-0 h-4 overflow-hidden">
            Aktivitas Real-Time...
        </div>

        <!-- Content Area -->
        <div class="content-area px-6 pt-4">
            <div id="view-global" class="space-y-6">
                <div class="bg-white/90 backdrop-blur-md p-6 rounded-[2.5rem] shadow-xl border border-white/50 relative transform transition-all focus-within:scale-[1.02]">
                    <button onclick="generateAIIdea()" class="absolute top-4 right-6 bg-purple-100 text-purple-600 p-2 rounded-full hover:rotate-12 transition-transform">
                        <i data-lucide="sparkles" class="w-4 h-4"></i>
                    </button>
                    <textarea id="global-input" placeholder="Tulis rahasiamu..." class="w-full bg-transparent border-none focus:ring-0 text-xl font-bold text-gray-800 h-28 resize-none placeholder:text-gray-200"></textarea>
                    <button id="send-btn" onclick="sendGlobal()" class="w-full bg-black text-white py-4 rounded-full font-black text-sm uppercase tracking-widest active:scale-95 transition-all shadow-lg">Kirim ke Global</button>
                </div>
                
                <div id="global-list" class="space-y-4"></div>
            </div>

            <div id="view-inbox" class="hidden">
                <div class="flex items-center justify-between mb-6 mt-4 px-2">
                    <h2 class="text-3xl font-black tracking-tighter">Inbox</h2>
                    <i data-lucide="shield-check" class="w-6 h-6 text-green-500 opacity-50"></i>
                </div>
                <div id="inbox-list" class="space-y-4 px-2"></div>
            </div>
        </div>

        <!-- Bottom Nav -->
        <div class="absolute bottom-8 left-1/2 -translate-x-1/2 w-[85%] h-20 bg-white/90 ios-blur rounded-[2.5rem] shadow-2xl border border-white/50 flex overflow-hidden z-[999]">
