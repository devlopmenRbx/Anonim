<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Global AnonChat - Luxury Edition</title>
    <link rel="icon" type="image/png" href="https://api.dicebear.com/7.x/bottts-neutral/svg?seed=anon&backgroundColor=b6e3f4">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @keyframes mesh { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .mesh-bg { background: linear-gradient(-45deg, #FF9A9E, #FAD0C4, #A18CD1, #FBC2EB); background-size: 400% 400%; animation: mesh 12s ease infinite; }
        .ios-blur { backdrop-filter: blur(25px) saturate(200%); -webkit-backdrop-filter: blur(25px) saturate(200%); }
        ::-webkit-scrollbar { display: none; }
        
        body { height: 100dvh; width: 100vw; overflow: hidden; position: fixed; }
        .content-area { height: calc(100dvh - 120px); overflow-y: auto; -webkit-overflow-scrolling: touch; }
        
        .nav-active { color: #db2777 !important; transform: scale(1.1); font-weight: 900; }
        .nav-btn { flex: 1; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.2s ease; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        
        /* YouTube Player Hidden */
        #player-container { position: absolute; width: 0; height: 0; visibility: hidden; }
    </style>
</head>
<body class="mesh-bg font-sans antialiased text-gray-900">

    <div class="px-6 pt-10 pb-4 flex justify-between items-center relative z-10">
        <div>
            <h1 class="text-3xl font-black tracking-tighter text-black/80">AnonChat</h1>
            <div class="flex items-center space-x-2 mt-1">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span id="online-count" class="text-[10px] font-black uppercase text-black/50 tracking-widest">Memuat...</span>
            </div>
        </div>
        <div class="flex space-x-3">
            <button onclick="document.body.click()" class="bg-white/40 p-3 rounded-full ios-blur shadow-lg active:scale-90 transition-all">
                <i data-lucide="music" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <div class="content-area px-6">
        <!-- VIEW: GLOBAL -->
        <div id="view-global" class="space-y-6">
            <div class="bg-white/90 ios-blur p-6 rounded-[2.5rem] shadow-xl border border-white/50 relative">
                <div class="absolute top-4 right-6 flex space-x-2">
                    <button onclick="generateAIIdea()" class="bg-purple-100 text-purple-600 p-2 rounded-full hover:bg-purple-200 transition-all">
                        <i data-lucide="sparkles" class="w-4 h-4"></i>
                    </button>
                </div>
                <textarea id="global-input" placeholder="Tulis rahasiamu ke feed global..." class="w-full bg-transparent border-none focus:ring-0 text-xl font-bold text-gray-800 h-24 resize-none placeholder:text-gray-300"></textarea>
                <button id="send-btn" onclick="sendGlobal()" class="w-full bg-black text-white py-4 rounded-full font-black text-sm uppercase tracking-widest active:scale-95 transition-all shadow-lg">Kirim ke Global</button>
            </div>
            
            <div id="global-list" class="space-y-4">
                <!-- Pesan global akan muncul di sini -->
            </div>
        </div>

        <!-- VIEW: INBOX -->
        <div id="view-inbox" class="hidden animate-in fade-in slide-in-from-right-4">
            <h2 class="text-3xl font-black tracking-tighter mb-6">Pesan Masuk</h2>
            <div id="inbox-list" class="space-y-4">
                <!-- Pesan masuk akan muncul di sini -->
            </div>
        </div>
    </div>

    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] h-20 bg-white/95 ios-blur rounded-[2.5rem] shadow-2xl border border-white/50 flex justify-around items-center z-[999] overflow-hidden">
        <div id="tab-global" onclick="switchTab('global')" class="nav-btn nav-active">
            <i data-lucide="globe" class="w-6 h-6"></i>
            <span class="text-[9px] font-black uppercase mt-1">Global</span>
        </div>
        <div id="tab-inbox" onclick="switchTab('inbox')" class="nav-btn text-black/30 relative">
            <i data-lucide="message-circle" class="w-6 h-6"></i>
            <span class="text-[9px] font-black uppercase mt-1">Inbox</span>
            <div id="inbox-badge" class="hidden absolute top-4 right-8 bg-red-500 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center border-2 border-white font-bold animate-bounce">0</div>
        </div>
    </div>

    <div id="luxury-toast" class="fixed bottom-32 left-1/2 -translate-x-1/2 bg-black text-white px-6 py-3 rounded-full text-xs font-black uppercase tracking-widest shadow-2xl transition-all duration-300 opacity-0 translate-y-20 z-[1000]">
        Pesan Berhasil! ✨
    </div>

    <div id="private-modal" class="hidden fixed inset-0 z-[2000] items-center justify-center p-6 bg-black/40 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl animate-in zoom-in-95 duration-300">
            <div class="flex justify-between items-start mb-6">
                <h3 class="text-xl font-black tracking-tight">Kirim Pesan ke <br><span id="target-anon-name" class="text-pink-600">@anon</span></h3>
                <button onclick="closePrivateModal()" class="text-gray-300 hover:text-gray-600"><i data-lucide="x"></i></button>
            </div>
            <textarea id="private-input" placeholder="Tulis pesan rahasia..." class="w-full bg-gray-50 rounded-[2rem] p-6 border-none focus:ring-2 ring-pink-500 text-lg font-bold min-h-[150px] mb-6"></textarea>
            <button id="send-private-btn" onclick="sendPrivate()" class="w-full bg-gradient-to-r from-pink-500 to-rose-600 text-white py-5 rounded-full font-black uppercase tracking-widest shadow-lg active:scale-95 transition-all">Kirim Pesan</button>
        </div>
    </div>

    <div id="player-container"><div id="yt-player"></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, serverTimestamp, where, doc, updateDoc, arrayUnion, increment, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCWCXK058NvKRUS5ifqWWFUw0n5nN25S-s",
            authDomain: "anonim-a20a5.firebaseapp.com",
            databaseURL: "https://anonim-a20a5-default-rtdb.firebaseio.com",
            projectId: "anonim-a20a5",
            storageBucket: "anonim-a20a5.firebasestorage.app",
            messagingSenderId: "680990138057",
            appId: "1:680990138057:web:c4cf29e026467a05eff718",
            measurementId: "G-X12LBR4XNY"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let activeTargetId = null;
        let inboxMessages = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                listenToGlobal();
                listenToInbox();
                updateOnlineCount();
            } else {
                try {
                    await signInAnonymously(auth);
                } catch (e) { console.error("Auth Error:", e); }
            }
        });

        window.sendGlobal = async () => {
            const input = document.getElementById('global-input');
            const text = input.value.trim();
            if (!text || !currentUser) return;
            const btn = document.getElementById('send-btn');
            btn.disabled = true;
            try {
                await addDoc(collection(db, "global_feed"), {
                    senderId: currentUser.uid,
                    content: text,
                    timestamp: serverTimestamp(),
                    color: getRandomNGLColor(),
                    likes: 0,
                    likedBy: [],
                    views: Math.floor(Math.random() * 20) + 1
                });
                input.value = "";
                showToast("Pesan Terkirim! 🚀");
            } catch (e) { console.error(e); } 
            finally { btn.disabled = false; }
        };

        function listenToGlobal() {
            const q = query(collection(db, "global_feed"), orderBy("timestamp", "desc"), limit(30));
            onSnapshot(q, (snapshot) => {
                const messages = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderGlobal(messages);
            });
        }

        window.toggleLike = async (docId) => {
            if (!docId || !currentUser) return;
            const docRef = doc(db, "global_feed", docId);
            try {
                const snap = await getDoc(docRef);
                if (!snap.exists()) return;
                const data = snap.data();
                const likedBy = data.likedBy || [];
                if (likedBy.includes(currentUser.uid)) {
                    showToast("Sudah disukai! ❤️");
                    return;
                }
                await updateDoc(docRef, {
                    likedBy: arrayUnion(currentUser.uid),
                    likes: increment(1)
                });
            } catch (e) { console.error(e); }
        };

        function listenToInbox() {
            if (!currentUser) return;
            const q = query(collection(db, "private_messages"), where("receiverId", "==", currentUser.uid));
            onSnapshot(q, (snapshot) => {
                inboxMessages = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                inboxMessages.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                const badge = document.getElementById('inbox-badge');
                badge.innerText = inboxMessages.length;
                badge.classList.toggle('hidden', inboxMessages.length === 0);
            });
        }

        window.openPrivateModal = (targetId, name) => {
            activeTargetId = targetId;
            document.getElementById('target-anon-name').innerText = name;
            document.getElementById('private-modal').classList.replace('hidden', 'flex');
        };

        window.closePrivateModal = () => {
            document.getElementById('private-modal').classList.replace('flex', 'hidden');
            document.getElementById('private-input').value = "";
        };

        window.sendPrivate = async () => {
            const text = document.getElementById('private-input').value.trim();
            if (!text || !activeTargetId) return;
            try {
                await addDoc(collection(db, "private_messages"), {
                    senderId: currentUser.uid,
                    receiverId: activeTargetId,
                    content: text,
                    timestamp: serverTimestamp()
                });
                showToast("Rahasia Terkirim! 🤫");
                closePrivateModal();
            } catch (e) { console.error(e); }
        };

        function renderGlobal(messages) {
            const container = document.getElementById('global-list');
            container.innerHTML = messages.map(msg => {
                const shortId = msg.senderId ? msg.senderId.slice(0, 4) : 'xxxx';
                const avatar = `https://api.dicebear.com/7.x/avataaars/svg?seed=${msg.senderId}&backgroundColor=b6e3f4`;
                const likes = msg.likes || 0;
                const hasLiked = msg.likedBy?.includes(currentUser?.uid);
                return `
                <div class="${msg.color || 'bg-pink-500'} p-6 rounded-[2.5rem] shadow-lg mb-6 active:scale-[0.98] transition-all relative overflow-hidden">
                    ${likes > 5 ? '<div class="absolute top-4 -right-8 bg-yellow-400 text-black text-[8px] font-black px-10 py-1 rotate-45 z-20">HOT</div>' : ''}
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center space-x-3">
                            <img src="${avatar}" class="w-8 h-8 rounded-full bg-white/20 border border-white/30">
                            <span class="text-[10px] text-white font-black uppercase tracking-widest">@anon_${shortId}</span>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="openPrivateModal('${msg.senderId}', '@anon_${shortId}')" class="bg-white/20 p-2 rounded-full"><i data-lucide="send" class="w-4 h-4 text-white"></i></button>
                        </div>
                    </div>
                    <p class="text-white font-bold text-xl leading-tight mb-4 italic">"${msg.content}"</p>
                    <div class="flex justify-between items-center">
                        <div class="bg-black/10 px-3 py-1 rounded-full text-[10px] text-white/50 font-bold">${(msg.views || 0) + (likes * 2)} views</div>
                        <button onclick="toggleLike('${msg.id}')" class="flex items-center space-x-2 bg-white/20 px-4 py-2 rounded-full">
                            <i data-lucide="heart" class="w-4 h-4 text-white ${hasLiked ? 'fill-white' : ''}"></i>
                            <span class="text-white text-xs font-black">${likes}</span>
                        </button>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        window.renderInbox = (messages) => {
            const container = document.getElementById('inbox-list');
            if (messages.length === 0) {
                container.innerHTML = `<div class="flex flex-col items-center py-20 opacity-30"><i data-lucide="ghost" class="w-16 h-16 mb-4"></i><p class="font-bold">Inbox kosong...</p></div>`;
            } else {
                container.innerHTML = messages.map(msg => `<div class="bg-white/70 p-6 rounded-[2.5rem] border border-white/50 mb-4 shadow-sm active:scale-95 transition-all"><p class="text-gray-800 font-bold text-lg">"${msg.content}"</p></div>`).join('');
            }
            lucide.createIcons();
        };

        window.switchTab = (tab) => {
            const g = document.getElementById('view-global');
            const i = document.getElementById('view-inbox');
            const tg = document.getElementById('tab-global');
            const ti = document.getElementById('tab-inbox');
            if (tab === 'global') {
                g.classList.remove('hidden'); i.classList.add('hidden');
                tg.classList.add('nav-active'); ti.classList.replace('nav-active', 'text-black/30');
            } else {
                g.classList.add('hidden'); i.classList.remove('hidden');
                ti.classList.add('nav-active'); tg.classList.replace('nav-active', 'text-black/30');
                window.renderInbox(inboxMessages);
            }
        };

        window.showToast = (text) => {
            const t = document.getElementById('luxury-toast');
            t.innerText = text;
            t.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => t.classList.add('translate-y-20', 'opacity-0'), 2500);
        };

        window.generateAIIdea = () => {
            const ideas = ["Apa rahasia terbesarmu?", "Kesan pertama pas liat aku?", "Siapa yang lagi kamu suka?", "Pernah bohong soal apa?"];
            document.getElementById('global-input').value = ideas[Math.floor(Math.random() * ideas.length)];
        };

        window.getRandomNGLColor = () => {
            const colors = ['bg-gradient-to-br from-pink-500 to-rose-600', 'bg-gradient-to-br from-indigo-500 to-purple-600', 'bg-gradient-to-br from-emerald-400 to-teal-600', 'bg-gradient-to-br from-orange-500 to-red-600'];
            return colors[Math.floor(Math.random() * colors.length)];
        };

        function updateOnlineCount() {
            const c = Math.floor(Math.random() * 100) + 150;
            const el = document.getElementById('online-count');
            if (el) el.innerText = c + " Online";
        }

        setInterval(updateOnlineCount, 15000);
        lucide.createIcons();
    </script>

    <script>
        let player;
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.body.appendChild(tag);
        
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '0', width: '0', videoId: 'wbz5pGyWOP4',
                events: { 'onReady': (e) => {
                    document.body.addEventListener('click', () => { e.target.playVideo(); }, { once: true });
                }}
            });
        }
    </script>
</body>
</html>
