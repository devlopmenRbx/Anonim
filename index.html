<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Global AnonChat - NGL Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCWCXK058NvKRUS5ifqWWFUw0n5nN25S-s",
            authDomain: "anonim-a20a5.firebaseapp.com",
            databaseURL: "https://anonim-a20a5-default-rtdb.firebaseio.com",
            projectId: "anonim-a20a5",
            storageBucket: "anonim-a20a5.firebasestorage.app",
            messagingSenderId: "680990138057",
            appId: "1:680990138057:web:c4cf29e026467a05eff718",
            measurementId: "G-X12LBR4XNY"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let activeTargetId = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('my-id-display').innerText = user.uid.slice(0, 6);
                listenToGlobal();
                listenToInbox();
            } else {
                signInAnonymously(auth);
            }
        });

        window.sendGlobal = async () => {
            const input = document.getElementById('global-input');
            const text = input.value.trim();
            if (!text || !currentUser) return;

            const btn = document.getElementById('send-btn');
            btn.disabled = true;
            input.value = "";

            try {
                await addDoc(collection(db, "global_feed"), {
                    senderId: currentUser.uid,
                    content: text,
                    timestamp: serverTimestamp(),
                    color: getRandomNGLColor()
                });
            } catch (e) {
                console.error(e);
            } finally {
                btn.disabled = false;
            }
        };

        window.openPrivateModal = (targetId, targetName) => {
            activeTargetId = targetId;
            document.getElementById('target-anon-name').innerText = targetName;
            document.getElementById('private-modal').classList.remove('hidden');
            document.getElementById('private-modal').classList.add('flex');
        };

        window.closePrivateModal = () => {
            document.getElementById('private-modal').classList.add('hidden');
            document.getElementById('private-modal').classList.remove('flex');
            document.getElementById('private-input').value = "";
        };

        window.sendPrivate = async () => {
            const input = document.getElementById('private-input');
            const text = input.value.trim();
            if (!text || !currentUser || !activeTargetId) return;

            const btn = document.getElementById('send-private-btn');
            btn.disabled = true;
            btn.innerText = "Mengirim...";

            try {
                await addDoc(collection(db, "private_messages"), {
                    senderId: currentUser.uid,
                    receiverId: activeTargetId,
                    content: text,
                    timestamp: serverTimestamp()
                });
                
                btn.innerText = "Terkirim! ✅";
                setTimeout(() => {
                    closePrivateModal();
                    btn.innerText = "Kirim Pesan";
                    btn.disabled = false;
                }, 1500);
            } catch (e) {
                console.error(e);
                btn.disabled = false;
                btn.innerText = "Gagal, Coba Lagi";
            }
        };

        function listenToGlobal() {
            const q = query(collection(db, "global_feed"), limit(50)); 
            onSnapshot(q, (snapshot) => {
                const messages = snapshot.docs.map(doc => doc.data());
                messages.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                renderGlobal(messages);
            });
        }

        function listenToInbox() {
            const q = query(collection(db, "private_messages"), where("receiverId", "==", currentUser.uid));
            onSnapshot(q, (snapshot) => {
                const messages = snapshot.docs.map(doc => doc.data());
                messages.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));

                const badge = document.getElementById('inbox-badge');
                if(messages.length > 0) {
                    badge.classList.remove('hidden');
                    badge.innerText = messages.length;
                } else {
                    badge.classList.add('hidden');
                }
                renderInbox(messages);
            });
        }

        function renderGlobal(messages) {
            const container = document.getElementById('global-list');
            container.innerHTML = messages.map(msg => {
                const shortId = msg.senderId ? msg.senderId.slice(0, 4) : 'xxxx';
                const avatarUrl = `https://api.dicebear.com/7.x/avataaars/svg?seed=${msg.senderId}&backgroundColor=b6e3f4,c0aede,d1d4f9,ffdfbf`;
                
                return `
                <div class="${msg.color || 'bg-gradient-to-br from-pink-500 to-rose-600'} p-6 rounded-[2.5rem] shadow-lg mb-6 transform transition-all active:scale-[0.97]">
                    <div class="flex items-center justify-between mb-3">
                        <div class="flex items-center space-x-3 opacity-90">
                            <div class="w-8 h-8 rounded-full bg-white/20 border border-white/30 overflow-hidden">
                                <img src="${avatarUrl}" alt="Anon" class="w-full h-full object-cover">
                            </div>
                            <span class="text-[10px] text-white font-black uppercase tracking-widest">@anon_${shortId}</span>
                        </div>
                        <button onclick="openPrivateModal('${msg.senderId}', '@anon_${shortId}')" class="bg-white/20 hover:bg-white/30 p-2 rounded-full transition-colors">
                            <i data-lucide="send" class="w-4 h-4 text-white"></i>
                        </button>
                    </div>
                    <p class="text-white font-bold text-xl leading-tight italic">"${msg.content}"</p>
                    <div class="mt-4 flex justify-between items-center">
                        <div class="flex -space-x-2 opacity-70">
                             <div class="w-5 h-5 rounded-full border-2 border-white/50 bg-pink-400"></div>
                             <div class="w-5 h-5 rounded-full border-2 border-white/50 bg-blue-400"></div>
                        </div>
                        <div class="flex items-center space-x-1">
                            <span class="text-[9px] text-white/50 font-bold">REPLY</span>
                            <i data-lucide="heart" class="w-4 h-4 text-white fill-white"></i>
                        </div>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function renderInbox(messages) {
            const container = document.getElementById('inbox-list');
            if (messages.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-400 py-10 italic">Belum ada pesan rahasia...</p>';
                return;
            }
            container.innerHTML = messages.map(msg => `
                <div class="bg-white/60 p-5 rounded-[2rem] border border-white/50 mb-3 shadow-sm transform transition-all hover:scale-[1.02]">
                    <div class="flex items-center space-x-2 mb-2">
                        <div class="w-2 h-2 rounded-full bg-pink-500 animate-pulse"></div>
                        <span class="text-[8px] font-black text-pink-600 uppercase">Pesan Baru</span>
                    </div>
                    <p class="text-gray-800 font-bold text-lg leading-snug">"${msg.content}"</p>
                    <span class="text-[9px] text-gray-400 font-bold uppercase mt-3 block tracking-tighter">
                        Diterima: ${msg.timestamp ? new Date(msg.timestamp.toDate()).toLocaleTimeString() : 'Baru saja'}
                    </span>
                </div>`).join('');
        }

        function getRandomNGLColor() {
            const colors = [
                'bg-gradient-to-br from-pink-500 to-rose-600',
                'bg-gradient-to-br from-orange-400 to-red-500',
                'bg-gradient-to-br from-indigo-500 to-purple-600',
                'bg-gradient-to-br from-emerald-400 to-teal-600',
                'bg-gradient-to-br from-blue-500 to-cyan-500'
            ];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        window.switchTab = (tab) => {
            const globalView = document.getElementById('view-global');
            const inboxView = document.getElementById('view-inbox');
            const tabGlobal = document.getElementById('tab-global');
            const tabInbox = document.getElementById('tab-inbox');

            if (tab === 'global') {
                globalView.classList.remove('hidden');
                inboxView.classList.add('hidden');
                tabGlobal.classList.add('text-black');
                tabGlobal.classList.remove('text-black/30');
                tabInbox.classList.add('text-black/30');
                tabInbox.classList.remove('text-black');
            } else {
                globalView.classList.add('hidden');
                inboxView.classList.remove('hidden');
                tabInbox.classList.add('text-black');
                tabInbox.classList.remove('text-black/30');
                tabGlobal.classList.add('text-black/30');
                tabGlobal.classList.remove('text-black');
            }
        };

        let player;
        window.onYouTubeIframeAPIReady = () => {
            player = new YT.Player('player-frame', {
                height: '0', width: '0', videoId: 'jfKfPfyJRdk',
                events: {
                    'onReady': (e) => {
                        document.body.addEventListener('click', () => {
                            e.target.playVideo();
                            document.getElementById('music-icon').classList.add('animate-spin');
                        }, { once: true });
                    }
                }
            });
        };
    </script>

    <style>
        @keyframes mesh {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .mesh-bg {
            background: linear-gradient(-45deg, #FF9A9E, #FAD0C4, #A18CD1, #FBC2EB);
            background-size: 400% 400%;
            animation: mesh 12s ease infinite;
        }
        .ios-blur {
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
        }
        ::-webkit-scrollbar { display: none; }
        
        .app-container { height: 100vh; width: 100vw; display: flex; flex-direction: column; position: relative; }
        @media (min-width: 640px) {
            .app-container { height: 850px; width: 400px; border-radius: 3.5rem; margin: 20px; border: 8px solid rgba(255,255,255,0.3); }
        }
    </style>
</head>
<body class="mesh-bg min-h-screen flex items-center justify-center font-sans antialiased text-gray-900 overflow-hidden">

    <div class="app-container bg-white/30 ios-blur shadow-2xl overflow-hidden">
        
        <!-- HEADER -->
        <div class="pt-14 px-8 pb-4 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-black tracking-tighter">AnonChat</h1>
                <p class="text-[10px] font-bold text-black/40 uppercase tracking-widest">ID: <span id="my-id-display">...</span></p>
            </div>
            <div class="flex space-x-3">
                <button class="w-10 h-10 bg-white/60 rounded-full flex items-center justify-center shadow-sm">
                    <i id="music-icon" data-lucide="music" class="w-4 h-4"></i>
                    <div id="player-frame"></div>
                </button>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="flex-1 overflow-y-auto px-6 pt-4 pb-32">
            
            <!-- VIEW: GLOBAL FEED -->
            <div id="view-global" class="space-y-6">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-white/50">
                    <div class="flex items-center space-x-3 mb-4">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-pink-500 to-purple-600 flex items-center justify-center text-white font-black italic">G</div>
                        <span class="text-sm font-bold text-black/30 italic uppercase tracking-tighter">Kirim Pesan Global...</span>
                    </div>
                    <textarea id="global-input" placeholder="Apa yang ingin kamu katakan secara rahasia?" 
                              class="w-full bg-transparent border-none focus:ring-0 text-xl font-bold text-gray-800 h-24 resize-none placeholder:text-gray-200"></textarea>
                    <button id="send-btn" onclick="sendGlobal()" class="w-full bg-black text-white py-4 rounded-full font-black text-sm uppercase tracking-widest active:scale-95 transition-all shadow-lg">
                        Kirim Sekarang!
                    </button>
                </div>

                <div id="global-list" class="space-y-4"></div>
            </div>

            <!-- VIEW: INBOX -->
            <div id="view-inbox" class="hidden animate-in fade-in slide-in-from-right-4">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-3xl font-black tracking-tighter">Inbox</h2>
                    <span class="bg-black text-white text-[10px] px-3 py-1 rounded-full font-black uppercase tracking-widest">Rahasia</span>
                </div>
                <div id="inbox-list" class="space-y-4"></div>
            </div>
        </div>

        <!-- MODAL PRIVATE MESSAGE -->
        <div id="private-modal" class="hidden fixed inset-0 z-[100] bg-black/60 backdrop-blur-md items-center justify-center p-6">
            <div class="bg-white w-full max-w-sm rounded-[3rem] overflow-hidden shadow-2xl">
                <div class="bg-gradient-to-br from-pink-500 to-rose-600 p-8 text-center text-white">
                    <div class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i data-lucide="lock" class="w-8 h-8"></i>
                    </div>
                    <h3 class="text-xl font-black tracking-tighter">Kirim Pesan Privat</h3>
                    <p class="text-[10px] font-bold opacity-70 mt-1">Ke: <span id="target-anon-name">@anon_xxxx</span></p>
                </div>
                <div class="p-8">
                    <textarea id="private-input" placeholder="Tulis pesan rahasiamu..." 
                              class="w-full h-32 bg-gray-50 rounded-2xl p-4 border-none focus:ring-2 focus:ring-pink-500 text-gray-800 font-bold resize-none mb-6"></textarea>
                    <div class="flex space-x-3">
                        <button onclick="closePrivateModal()" class="flex-1 bg-gray-100 text-gray-400 py-4 rounded-full font-black text-xs uppercase">Batal</button>
                        <button id="send-private-btn" onclick="sendPrivate()" class="flex-[2] bg-black text-white py-4 rounded-full font-black text-xs uppercase shadow-lg">Kirim</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- BOTTOM NAV -->
        <div class="absolute bottom-10 left-1/2 -translate-x-1/2 w-[85%] h-20 bg-white/80 ios-blur rounded-[2.5rem] shadow-2xl border border-white flex justify-around items-center px-6 z-50">
            <button id="tab-global" onclick="switchTab('global')" class="flex flex-col items-center space-y-1 text-black">
                <i data-lucide="globe" class="w-6 h-6"></i>
                <span class="text-[9px] font-black uppercase">Global</span>
            </button>
            <div class="w-[1px] h-8 bg-black/5"></div>
            <button id="tab-inbox" onclick="switchTab('inbox')" class="relative flex flex-col items-center space-y-1 text-black/30">
                <i data-lucide="message-circle" class="w-6 h-6"></i>
                <span class="text-[9px] font-black uppercase">Inbox</span>
                <div id="inbox-badge" class="hidden absolute -top-1 -right-2 bg-red-500 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center border-2 border-white font-bold">0</div>
            </button>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
