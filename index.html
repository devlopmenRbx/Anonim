<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Secret Gallery | Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --rose-gold: #d4a373;
            --soft-ivory: #faf9f6;
            --ios-glass: rgba(255, 255, 255, 0.7);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--soft-ivory);
            color: #333;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .serif { font-family: 'Playfair Display', serif; }

        .glass {
            background: var(--ios-glass);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .gold-text {
            background: linear-gradient(to bottom right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes petal-fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        .animate-fade { animation: fadeIn 0.6s ease-out forwards; }
        .ios-btn:active { transform: scale(0.95); transition: 0.1s; }

        .petal {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            color: #ffb7c5;
        }

        .pin-dot { width: 12px; height: 12px; border-radius: 50%; border: 1.5px solid var(--rose-gold); transition: 0.3s; }
        .pin-dot.filled { background-color: var(--rose-gold); box-shadow: 0 0 10px var(--rose-gold); }
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        #lockScreen {
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
        }

        .gallery-item {
            aspect-ratio: 1/1;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .gallery-item:hover { transform: scale(1.02); }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <!-- Petals Background -->
    <div id="petalsContainer"></div>

    <!-- Lock Screen -->
    <div id="lockScreen" class="fixed inset-0 z-[100] flex flex-col items-center justify-between py-16 transition-all duration-1000">
        <div class="text-center animate-fade">
            <p class="text-sm tracking-[0.3em] uppercase opacity-40 mb-2 font-semibold">Locked Archive</p>
            <div id="lockTime" class="text-7xl font-light tracking-tighter mb-1">00:00</div>
            <div id="lockDate" class="text-lg opacity-60 font-medium">Wednesday, 12 May</div>
        </div>

        <div class="flex flex-col items-center">
            <div class="flex space-x-5 mb-10" id="pinDots">
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
            </div>

            <div id="keypad" class="grid grid-cols-3 gap-5">
                <!-- Numbers generated by JS -->
            </div>
        </div>

        <div class="flex flex-col items-center space-y-3 opacity-40">
            <i data-lucide="scan-face" class="w-8 h-8"></i>
            <p class="text-[10px] tracking-widest uppercase">Biometric Security</p>
        </div>
    </div>

    <!-- Main Content -->
    <main id="appContent" class="hidden min-h-screen">
        <!-- Header -->
        <header class="sticky top-0 z-50 glass px-6 py-5 flex justify-between items-center border-b border-white/20">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-orange-200 to-rose-200 flex items-center justify-center shadow-sm">
                    <span class="text-white font-bold text-xs">M&Y</span>
                </div>
                <div>
                    <h1 class="serif text-lg font-semibold text-gray-800 italic">Our Memories</h1>
                    <div class="flex items-center space-x-1">
                        <div id="dbStatus" class="w-1.5 h-1.5 rounded-full bg-red-400"></div>
                        <span class="text-[9px] opacity-50 uppercase tracking-widest font-bold">Cloud Sync</span>
                    </div>
                </div>
            </div>
            
            <div class="flex items-center space-x-4">
                <button onclick="toggleMusic()" class="ios-btn text-rose-400 p-2 glass rounded-full">
                    <i id="musicIcon" data-lucide="music" class="w-5 h-5"></i>
                </button>
                <label class="ios-btn bg-rose-400 text-white w-9 h-9 rounded-full flex items-center justify-center cursor-pointer shadow-lg shadow-rose-200">
                    <i data-lucide="plus" class="w-5 h-5"></i>
                    <input type="file" id="fileInput" class="hidden" accept="image/*" multiple>
                </label>
            </div>
        </header>

        <!-- Highlights (Stories) -->
        <section class="mt-6 px-4">
            <div id="storiesList" class="flex space-x-5 overflow-x-auto pb-4 scroll-smooth">
                <!-- Dynamic Stories -->
            </div>
        </section>

        <!-- Gallery -->
        <section class="mt-4 px-4 pb-32">
            <h2 class="serif text-2xl text-gray-800 mb-6 italic px-2">The Archive</h2>
            <div id="galleryGrid" class="grid grid-cols-2 md:grid-cols-3 gap-4">
                <!-- Photos will appear here -->
            </div>
        </section>

        <!-- Spotify Drawer -->
        <div id="spotifyDrawer" class="fixed bottom-0 left-0 right-0 z-[60] transform translate-y-[calc(100%-65px)] transition-transform duration-700 ease-[cubic-bezier(0.32,0,0.67,0)]">
            <div onclick="toggleSpotify()" class="glass rounded-t-[32px] h-[65px] flex items-center justify-center cursor-pointer border-t border-rose-100 shadow-2xl">
                <div class="w-10 h-1 bg-gray-300 rounded-full absolute top-3"></div>
                <div class="flex items-center space-x-2">
                    <i data-lucide="play-circle" class="w-4 h-4 text-green-500"></i>
                    <span class="text-[10px] font-bold tracking-[0.2em] uppercase text-gray-500">Spotify Playback</span>
                </div>
            </div>
            <div class="h-[380px] bg-white p-4">
                <iframe style="border-radius:20px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DX4P6NgaXNn9F?utm_source=generator&theme=0" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>
        </div>

        <!-- Navigation Bar -->
        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[85%] glass rounded-full h-16 flex items-center justify-around px-8 z-50 shadow-xl border border-white/40">
            <button class="ios-btn text-rose-400"><i data-lucide="layout-grid"></i></button>
            <button class="ios-btn opacity-30"><i data-lucide="heart"></i></button>
            <button class="ios-btn opacity-30"><i data-lucide="settings"></i></button>
        </nav>
    </main>

    <!-- Lightbox -->
    <div id="lightbox" class="fixed inset-0 z-[200] hidden flex-col glass p-6">
        <div class="flex justify-between items-center mb-6">
            <button onclick="closeLightbox()" class="ios-btn text-gray-400"><i data-lucide="x"></i></button>
            <button id="deleteBtn" class="ios-btn text-red-400"><i data-lucide="trash-2"></i></button>
        </div>
        <div class="flex-1 flex items-center justify-center">
            <img id="lightboxImg" src="" class="max-w-full max-h-[70vh] rounded-3xl shadow-2xl object-contain border-4 border-white">
        </div>
        <div class="mt-8 text-center animate-fade">
            <p id="lightboxCaption" class="text-xl serif italic text-gray-800"></p>
            <p id="lightboxDate" class="text-[10px] opacity-40 mt-2 uppercase tracking-widest font-bold"></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // CONFIG ANDA
        const firebaseConfig = {
            apiKey: "AIzaSyBfk6XCQ7sTOo2ZLdn4HUV6IO7QJjM-yvI",
            authDomain: "chatweb-8f41f.firebaseapp.com",
            databaseURL: "https://chatweb-8f41f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "chatweb-8f41f",
            storageBucket: "chatweb-8f41f.firebasestorage.app",
            messagingSenderId: "915078941404",
            appId: "1:915078941404:web:d137422f922f5d1e938219",
            measurementId: "G-3L1ZRM46WN"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const appId = 'v1_luxury_vault_final';
        const photoCol = collection(db, 'artifacts', appId, 'public', 'data', 'photos');

        // State
        let currentPin = "";
        const CORRECT_PIN = "1212";
        let isMusicPlaying = false;
        let synth, loop;
        let photos = [];

        // Elements
        const $ = (id) => document.getElementById(id);

        window.initApp = () => {
            lucide.createIcons();
            updateClock();
            setInterval(updateClock, 1000);
            renderKeypad();
            spawnPetals();
            syncPhotos();
        };

        function updateClock() {
            const now = new Date();
            $('lockTime').innerText = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' });
            $('lockDate').innerText = now.toLocaleDateString('en-US', { weekday: 'long', day: 'numeric', month: 'long' });
        }

        function renderKeypad() {
            const grid = $('keypad');
            [1,2,3,4,5,6,7,8,9,'',0,'⌫'].forEach(val => {
                const btn = document.createElement('button');
                btn.className = `ios-btn w-16 h-16 rounded-full flex items-center justify-center text-2xl font-light border border-gray-200/50 bg-white/40 shadow-sm ${val === '' ? 'invisible' : ''}`;
                btn.innerHTML = val === '⌫' ? '<i data-lucide="delete" class="w-6 h-6 opacity-40"></i>' : val;
                btn.onclick = () => handlePinInput(val);
                grid.appendChild(btn);
            });
            lucide.createIcons();
        }

        function handlePinInput(val) {
            if (val === '⌫') {
                currentPin = currentPin.slice(0, -1);
            } else if (typeof val === 'number') {
                if (currentPin.length < 4) {
                    currentPin += val;
                    playKeySound(val);
                }
            }
            updatePinDots();

            if (currentPin.length === 4) {
                if (currentPin === CORRECT_PIN) {
                    unlockApp();
                } else {
                    failPin();
                }
            }
        }

        function updatePinDots() {
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((dot, i) => {
                dot.classList.toggle('filled', i < currentPin.length);
            });
        }

        function failPin() {
            const container = $('pinDots');
            container.classList.add('shake');
            setTimeout(() => {
                container.classList.remove('shake');
                currentPin = "";
                updatePinDots();
            }, 500);
        }

        function unlockApp() {
            $('lockScreen').style.transform = 'translateY(-100%)';
            $('lockScreen').style.opacity = '0';
            setTimeout(() => {
                $('lockScreen').style.display = 'none';
                $('appContent').classList.remove('hidden');
                $('appContent').classList.add('animate-fade');
            }, 800);
        }

        // Firebase Sync
        function syncPhotos() {
            onSnapshot(photoCol, (snapshot) => {
                photos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderGallery();
                $('dbStatus').className = "w-1.5 h-1.5 rounded-full bg-green-400 shadow-[0_0_8px_#4ade80]";
            }, (error) => {
                $('dbStatus').className = "w-1.5 h-1.5 rounded-full bg-red-400";
            });
        }

        async function uploadPhoto(e) {
            const files = e.target.files;
            for (let file of files) {
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const base64 = event.target.result;
                    const caption = prompt("Tulis pesan cinta untuk momen ini:") || "Forever and always.";
                    await addDoc(photoCol, {
                        url: base64,
                        caption: caption,
                        timestamp: Date.now()
                    });
                };
                reader.readAsDataURL(file);
            }
        }

        function renderGallery() {
            const grid = $('galleryGrid');
            const stories = $('storiesList');
            grid.innerHTML = '';
            stories.innerHTML = '';

            // Stories
            photos.slice(-6).reverse().forEach(photo => {
                const story = document.createElement('div');
                story.className = "flex-shrink-0 w-20 h-20 rounded-full p-1 border-2 border-rose-300 shadow-sm ios-btn cursor-pointer bg-white";
                story.innerHTML = `<img src="${photo.url}" class="w-full h-full rounded-full object-cover">`;
                story.onclick = () => openLightbox(photo);
                stories.appendChild(story);
            });

            // Grid
            photos.sort((a,b) => b.timestamp - a.timestamp).forEach(photo => {
                const div = document.createElement('div');
                div.className = "gallery-item rounded-[24px] overflow-hidden shadow-sm ios-btn cursor-pointer bg-white border border-rose-100/50";
                div.innerHTML = `
                    <img src="${photo.url}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent opacity-0 hover:opacity-100 transition-opacity"></div>
                `;
                div.onclick = () => openLightbox(photo);
                grid.appendChild(div);
            });
        }

        window.openLightbox = (photo) => {
            $('lightboxImg').src = photo.url;
            $('lightboxCaption').innerText = photo.caption;
            $('lightboxDate').innerText = new Date(photo.timestamp).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
            $('lightbox').classList.remove('hidden');
            $('deleteBtn').onclick = () => deletePhoto(photo.id);
        };

        window.closeLightbox = () => $('lightbox').classList.add('hidden');

        async function deletePhoto(id) {
            if (confirm("Hapus kenangan ini selamanya?")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'photos', id));
                closeLightbox();
            }
        }

        function playKeySound(num) {
            if (!synth) synth = new Tone.PolySynth(Tone.Synth, { oscillator: { type: "sine" } }).toDestination();
            const notes = ["C5", "D5", "E5", "F5", "G5", "A5", "B5", "C6", "D6", "E6"];
            synth.triggerAttackRelease(notes[num % 10], "16n", undefined, 0.1);
        }

        window.toggleMusic = () => {
            if (!isMusicPlaying) {
                Tone.start();
                if (!loop) {
                    const melody = ["C4", "E4", "G4", "B4", "A4", "F4", "E4", "D4"];
                    let idx = 0;
                    loop = new Tone.Loop(time => {
                        synth.triggerAttackRelease(melody[idx % melody.length], "4n", time, 0.1);
                        idx++;
                    }, "2n").start(0);
                }
                Tone.Transport.start();
                $('musicIcon').innerHTML = '<i data-lucide="music-2" class="w-5 h-5"></i>';
                isMusicPlaying = true;
            } else {
                Tone.Transport.stop();
                $('musicIcon').innerHTML = '<i data-lucide="music" class="w-5 h-5"></i>';
                isMusicPlaying = false;
            }
            lucide.createIcons();
        };

        window.toggleSpotify = () => {
            const drawer = $('spotifyDrawer');
            const isOpened = drawer.style.transform === 'translateY(0px)';
            drawer.style.transform = isOpened ? 'translateY(calc(100% - 65px))' : 'translateY(0px)';
        };

        function spawnPetals() {
            const container = $('petalsContainer');
            setInterval(() => {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.innerHTML = `<i data-lucide="heart" class="fill-current w-3 h-3"></i>`;
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.animation = `petal-fall ${5 + Math.random() * 5}s linear forwards`;
                container.appendChild(petal);
                lucide.createIcons();
                setTimeout(() => petal.remove(), 10000);
            }, 2000);
        }

        $('fileInput').onchange = uploadPhoto;
        window.onload = initApp;

    </script>
</body>
</html>
